<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayPilot</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3370FF;--primary-hover:#2860E1;--primary-light:#E8F0FF;
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E5E6EB;--border-light:#F2F3F5;
  --text-1:#1D2129;--text-2:#4E5969;--text-3:#86909C;--text-4:#C9CDD4;
  --red:#F53F3F;--hour-h:60px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;color:var(--text-1);background:var(--bg);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit}
input,select{font-family:inherit;font-size:inherit}

.app{display:flex;flex-direction:column;height:100vh}
.header{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px;min-width:160px}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#3370FF,#5B8DEF);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.header-title{font-size:16px;font-weight:600}
.header-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
.header-right{min-width:160px;display:flex;justify-content:flex-end;gap:6px;align-items:center}
.nav-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:22px;transition:background .15s}
.nav-btn:hover{background:var(--border-light)}
.today-btn{height:32px;padding:0 14px;border-radius:8px;border:1px solid var(--border);color:var(--text-2);font-size:13px;font-weight:500;transition:all .15s}
.today-btn:hover{border-color:var(--primary);color:var(--primary)}
.date-display{font-size:16px;font-weight:600;min-width:220px;text-align:center}
.view-switcher{display:flex;background:var(--border-light);border-radius:8px;padding:3px;gap:2px}
.view-btn{padding:5px 16px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text-2);transition:all .15s}
.view-btn.active{background:var(--surface);color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.view-btn:hover:not(.active){color:var(--text-1)}
.export-btn{height:32px;padding:0 14px;border-radius:8px;border:1px solid var(--border);color:var(--text-2);font-size:13px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.export-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.export-btn svg{flex-shrink:0}
.main-area{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border)}
.sidebar-section{flex-shrink:0}
.sidebar-section.categories-section{border-bottom:1px solid var(--border-light)}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;font-size:12px;font-weight:600;color:var(--text-3);letter-spacing:.5px;user-select:none}
.section-header .section-btn{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-3);transition:all .15s}
.section-header .section-btn:hover{background:var(--primary-light);color:var(--primary)}
.section-header .section-label{display:flex;align-items:center;gap:6px}
.section-header .today-date-tag{font-size:11px;font-weight:500;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:10px}
.cat-list{padding:4px 8px 8px}
.cat-item{display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;transition:all .15s;border-radius:8px;margin-bottom:1px;position:relative}
.cat-item:hover{background:var(--border-light)}
.cat-item.active{background:var(--primary-light)}
.cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-name{font-size:13px;color:var(--text-1);flex:1}
.cat-item.active .cat-name{font-weight:500}
.cat-count{font-size:11px;color:var(--text-4);min-width:18px;text-align:right;font-weight:500}
.cat-del{display:none;width:20px;height:20px;border-radius:4px;align-items:center;justify-content:center;font-size:14px;color:var(--text-4);flex-shrink:0}
.cat-item:hover .cat-del{display:flex}
.cat-item:hover .cat-count{display:none}
.cat-del:hover{background:rgba(245,63,63,.1);color:var(--red)!important}
.add-cat-form{display:flex;align-items:center;gap:6px;padding:2px 8px 6px}
.add-cat-form input{flex:1;height:32px;border:1.5px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;outline:none;transition:border-color .15s}
.add-cat-form input:focus{border-color:var(--primary)}
.add-cat-confirm{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--primary);transition:background .15s}
.add-cat-confirm:hover{background:var(--primary-light)}
.today-section{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.today-tasks{flex:1;overflow-y:auto;padding:0 8px 8px}
.today-tasks::-webkit-scrollbar{width:4px}
.today-tasks::-webkit-scrollbar-thumb{background:var(--text-4);border-radius:2px}
.today-task-item{padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px;border-left:3px solid transparent}
.today-task-item:hover{background:var(--border-light)}
.today-task-item .tt-time{font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:2px}
.today-task-item .tt-body{display:flex;align-items:center;gap:6px}
.today-task-item .tt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.today-task-item .tt-title{font-size:13px;color:var(--text-1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.today-task-item .tt-project{font-size:11px;color:var(--text-3);margin-top:1px;padding-left:13px}
.today-task-item.past{opacity:.45}
.empty-state{padding:24px 16px;text-align:center;color:var(--text-4);font-size:13px}
.sidebar-footer{flex-shrink:0;padding:12px 16px;border-top:1px solid var(--border-light)}
.new-task-btn{width:100%;height:42px;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;box-shadow:0 2px 8px rgba(51,112,255,.25)}
.new-task-btn:hover{background:var(--primary-hover);box-shadow:0 4px 14px rgba(51,112,255,.35);transform:translateY(-1px)}
.new-task-btn:active{transform:translateY(0)}
.calendar-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.time-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.time-view-header{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.gutter-corner{width:56px;flex-shrink:0;border-right:1px solid var(--border)}
.day-headers{display:flex;flex:1}
.day-header{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-right:1px solid var(--border-light);transition:background .15s}
.day-header:last-child{border-right:none}
.day-header .dh-name{font-size:12px;color:var(--text-3)}
.day-header .dh-num{font-size:18px;font-weight:600;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s}
.day-header.today .dh-name{color:var(--primary);font-weight:500}
.day-header.today .dh-num{background:var(--primary);color:#fff}
.time-view-body{flex:1;display:flex;overflow-y:auto;overflow-x:hidden;position:relative}
.time-view-body::-webkit-scrollbar{width:6px}
.time-view-body::-webkit-scrollbar-track{background:transparent}
.time-view-body::-webkit-scrollbar-thumb{background:var(--text-4);border-radius:3px}
.time-gutter{width:56px;flex-shrink:0;position:relative;border-right:1px solid var(--border);background:var(--surface);z-index:2}
.time-label{position:absolute;right:8px;font-size:11px;color:var(--text-3);transform:translateY(-50%);line-height:1;font-weight:500}
.day-columns{flex:1;display:flex;position:relative}
.day-column{flex:1;position:relative;border-right:1px solid var(--border-light);cursor:crosshair;background-color:var(--surface);background-image:linear-gradient(to bottom,#c0c4cc 1px, transparent 1px);background-size:100% 60px;}
.day-column:last-child{border-right:none}
.day-column.today{background-color:rgba(51,112,255,.012);background-image:linear-gradient(to bottom,#b4b9c2 1px, transparent 1px);background-size:100% 60px;}
.task-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:4px 8px;cursor:pointer;overflow:hidden;font-size:12px;line-height:1.4;transition:box-shadow .2s,opacity .3s;z-index:1;border-left:3px solid var(--tc);user-select:none}
.task-block:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);z-index:10}
.task-block .tb-project{font-size:10px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;margin-bottom:1px;opacity:.75}
.task-block .tb-title{font-weight:500;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-block .tb-time{font-size:11px;color:var(--text-3);margin-top:1px}
.task-block .tb-cat{font-size:10px;font-weight:500;margin-top:1px;opacity:.65}
.task-block.dimmed{opacity:.1!important;pointer-events:none}
.current-time-line{position:absolute;left:-1px;right:0;height:2px;background:var(--red);z-index:50;pointer-events:none}
.current-time-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)}
.drag-selection{position:absolute;left:1px;right:1px;background:rgba(51,112,255,.1);border:2px dashed rgba(51,112,255,.35);border-radius:6px;z-index:40;pointer-events:none;display:flex;align-items:flex-start;padding:4px 6px}
.drag-selection .drag-label{font-size:11px;color:var(--primary);font-weight:600}
body.dragging{user-select:none;-webkit-user-select:none}
.month-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.month-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.month-header-cell{padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--text-2)}
.month-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;overflow:hidden}
.month-cell{border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);padding:6px 8px;cursor:pointer;transition:background .15s;overflow:hidden;min-height:70px;background:var(--surface)}
.month-cell:nth-child(7n){border-right:none}
.month-cell:hover{background:var(--primary-light)!important}
.month-cell.other-month{background:var(--border-light)}
.month-cell.other-month .mc-day{color:var(--text-4)}
.month-cell.is-today .mc-day-num{background:var(--primary);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.mc-day{font-size:13px;font-weight:500;margin-bottom:3px}
.mc-day-num{display:flex;align-items:center;justify-content:center}
.mc-task{display:block;max-width:100%;padding:1px 6px;border-radius:3px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;cursor:pointer;font-weight:500}
.mc-more{font-size:11px;color:var(--text-3);cursor:pointer;padding:1px 0}

/* ===== Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.modal{background:var(--surface);border-radius:16px;width:500px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .2s ease;overflow:hidden;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;position:relative;z-index:2}
.modal-header h3{font-size:18px;font-weight:600}
.modal-close-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--text-3);transition:all .15s}
.modal-close-btn:hover{background:var(--border-light);color:var(--text-1)}
.modal-body{padding:20px 24px;position:relative;z-index:2}
.modal-footer{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 20px;border-top:1px solid var(--border-light);position:relative;z-index:2}
.modal-footer-right{display:flex;gap:8px;margin-left:auto}
.form-group{margin-bottom:16px}
.form-group:last-child{margin-bottom:0}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:6px}
.form-group input[type="text"],.form-group input[type="date"]{width:100%;height:38px;border:1.5px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;color:var(--text-1);transition:border-color .15s;outline:none;background:var(--surface)}
.form-group input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(51,112,255,.08)}

/* ===== Datetime Row ===== */
.datetime-row{display:flex;gap:8px;align-items:center}
.datetime-row > input[type="date"]{width:155px;flex-shrink:0}
.time-range-field{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.time-range-input{flex:1;height:38px;border:1.5px solid var(--border);border-radius:8px;padding:0 10px;font-size:14px;color:var(--text-1);background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .15s,box-shadow .15s;user-select:none;position:relative;min-width:0}
.time-range-input:hover{border-color:var(--primary)}
.time-range-input.active{border-color:var(--primary);box-shadow:0 0 0 3px rgba(51,112,255,.08)}
.time-range-input .tri-icon{color:var(--text-3);flex-shrink:0}
.time-range-input .tri-text{flex:1;font-variant-numeric:tabular-nums;font-weight:500;font-size:14px}
.tri-sep{font-size:16px;font-weight:500;color:var(--text-3);user-select:none;flex-shrink:0}

/* ===== Time Picker Popover ===== */
.tp-popover{
  position:fixed;z-index:2000;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.12),0 0 1px rgba(0,0,0,.06);
  width:310px;overflow:hidden;
  animation:popIn .18s ease;
}
@keyframes popIn{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.tp-pop-tabs{display:flex;border-bottom:1px solid var(--border-light)}
.tp-pop-tab{
  flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;
  color:var(--text-3);cursor:pointer;transition:all .15s;position:relative;
  user-select:none;
}
.tp-pop-tab:hover{color:var(--text-2)}
.tp-pop-tab.active{color:var(--primary)}
.tp-pop-tab.active::after{
  content:'';position:absolute;bottom:-1px;left:25%;right:25%;
  height:2px;background:var(--primary);border-radius:1px;
}
.tp-pop-body{display:flex;height:220px}
.tp-pop-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tp-pop-col-label{text-align:center;padding:8px 0 4px;font-size:11px;font-weight:600;color:var(--text-4);letter-spacing:.5px;flex-shrink:0}
.tp-pop-list{flex:1;overflow-y:auto;scrollbar-width:none;padding:0 4px}
.tp-pop-list::-webkit-scrollbar{display:none}
.tp-pop-item{
  height:34px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-variant-numeric:tabular-nums;color:var(--text-2);
  cursor:pointer;border-radius:6px;margin:1px 2px;
  transition:all .1s;user-select:none;
}
.tp-pop-item:hover{background:var(--primary-light);color:var(--primary)}
.tp-pop-item.selected{background:var(--primary);color:#fff;font-weight:600}
.tp-pop-divider{width:1px;background:var(--border-light);flex-shrink:0}
.tp-pop-footer{
  padding:8px 12px 10px;border-top:1px solid var(--border-light);
}
.tp-pop-presets{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tp-pop-preset{
  height:26px;padding:0 10px;border-radius:13px;font-size:11px;
  color:var(--text-3);background:var(--border-light);border:none;cursor:pointer;
  transition:all .12s;font-weight:500;white-space:nowrap;line-height:1;
}
.tp-pop-preset:hover{background:var(--primary-light);color:var(--primary)}
.tp-pop-preset.tp-now{color:var(--primary);font-weight:600}
.tp-pop-info{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.tp-pop-dur{
  font-size:11px;color:var(--primary);background:var(--primary-light);
  padding:3px 9px;border-radius:10px;font-weight:600;white-space:nowrap;
}
.tp-pop-display{font-size:14px;font-weight:600;color:var(--text-1);font-variant-numeric:tabular-nums;white-space:nowrap}

.cat-picker{display:flex;flex-wrap:wrap;gap:8px}
.cat-pill{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.cat-pill:hover{transform:translateY(-1px)}
.cat-pill.selected{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn{height:36px;padding:0 20px;border-radius:8px;font-size:14px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--border-light);color:var(--text-2)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:#FFF0F0;color:var(--red)}
.btn-danger:hover{background:#FFE0E0}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
/* ===== Date Range Picker ===== */
.dr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.dr-panel{background:var(--surface);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden;width:640px;max-width:95vw;animation:slideUp .2s ease}
.dr-body{display:flex;gap:0}
.dr-side{width:130px;flex-shrink:0;padding:12px 0;border-right:1px solid var(--border-light);display:flex;flex-direction:column;gap:2px}
.dr-side-btn{display:block;width:100%;padding:8px 16px;text-align:left;font-size:13px;color:var(--text-2);background:none;border:none;cursor:pointer;transition:all .12s}
.dr-side-btn:hover{color:var(--primary);background:var(--primary-light)}
.dr-calendars{flex:1;display:flex;padding:12px 16px;gap:24px}
.dr-cal{flex:1;min-width:0}
.dr-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dr-cal-title{font-size:14px;font-weight:600;color:var(--text-1)}
.dr-cal-nav{display:flex;gap:2px}
.dr-cal-nav button{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-3);background:none;border:none;cursor:pointer;transition:all .12s}
.dr-cal-nav button:hover{background:var(--border-light);color:var(--text-1)}
.dr-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dr-weekday{text-align:center;font-size:11px;font-weight:600;color:var(--text-4);padding:4px 0}
.dr-days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:34px}
.dr-day{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-1);border-radius:50%;cursor:pointer;transition:all .12s;position:relative;user-select:none}
.dr-day:hover{background:var(--primary-light)}
.dr-day.today{font-weight:700;color:var(--primary)}
.dr-day.in-range{background:rgba(51,112,255,.08);border-radius:0}
.dr-day.start-date{background:var(--primary);color:#fff;border-radius:50% 0 0 50%}
.dr-day.end-date{background:var(--primary);color:#fff;border-radius:0 50% 50% 0}
.dr-day.start-date.end-date{border-radius:50%}
.dr-day.selected{background:var(--primary);color:#fff}
.dr-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border-light)}
.dr-footer-info{font-size:13px;color:var(--text-2)}
.dr-footer-info span{font-weight:600;color:var(--primary)}
.dr-footer-btns{display:flex;gap:8px}
.dr-footer-btns .btn{height:32px;padding:0 16px;font-size:13px}

/* ===== Projects Section ===== */
.proj-list{padding:4px 8px 8px}
.proj-item{display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;transition:all .15s;border-radius:8px;margin-bottom:1px;position:relative}
.proj-item:hover{background:var(--border-light)}
.proj-item.active{background:var(--primary-light)}
.proj-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;background:var(--primary)}

<script>
var HOUR_H=60,SNAP=15,SNAP_PX=HOUR_H*SNAP/60,TOTAL_H=24*HOUR_H;
var ST_T='sched_tasks_v4',ST_C='sched_cats_v4',ST_P='sched_projects_v4';
var W_NAMES=['周一','周二','周三','周四','周五','周六','周日'];
var PALETTE=['#3370FF','#00B42A','#FF7D00','#F53F3F','#722ED1','#14C9C9','#F759AB','#B71DE8','#EB2F96','#FA8C16','#13C2C2','#52C41A'];
var DEFAULT_CATS=[
  {id:'cat_dev',name:'开发',color:'#3370FF'},{id:'cat_meet',name:'会议',color:'#FF7D00'},
  {id:'cat_doc',name:'文档',color:'#00B42A'},{id:'cat_rev',name:'代码检视',color:'#722ED1'},
  {id:'cat_req',name:'需求',color:'#F53F3F'},{id:'cat_des',name:'设计',color:'#14C9C9'},
];
var curView='week',curDate=new Date(),tasks=[],categories=[],projects=[];
var editingId=null,selectedModalCat=null,filterCatId=null,filterProjId=null,projExpanded=false;
var drag=null;
var modalStartMin=9*60,modalEndMin=10*60;
var _modalDur=60;
var tpPopover=null,tpActive='start';

function uid(){return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function pd(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function fmtM(m){m=Math.max(0,Math.min(m,24*60-1));return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function hexRgba(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')'}
function getCat(id){return categories.find(function(c){return c.id===id})||categories[0]||{color:'#86909C',name:'未分类'}}
function isToday(d){var t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()}
function mToPx(m){return m*(HOUR_H/60)}
function pxToM(px){return Math.round(px/(HOUR_H/60)/SNAP)*SNAP}
function getWeekDays(d){var days=[];var dow=d.getDay()||7;var mon=new Date(d);mon.setDate(d.getDate()-dow+1);for(var i=0;i<7;i++){var dd=new Date(mon);dd.setDate(mon.getDate()+i);days.push(dd)}return days}
function weekLabel(days){var s=days[0],e=days[6];if(s.getMonth()===e.getMonth())return s.getFullYear()+'年'+(s.getMonth()+1)+'月'+s.getDate()+'日 - '+e.getDate()+'日';return s.getFullYear()+'年'+(s.getMonth()+1)+'月'+s.getDate()+'日 - '+(e.getMonth()+1)+'月'+e.getDate()+'日'}
// ==================== File Storage ====================
var FILE_NAMES={tasks:'sched_tasks.json',cats:'sched_cats.json',projects:'sched_projects.json'};
var _fileHandles={tasks:null,cats:null,projects:null};
var _fsSupported=!!window.showOpenFilePicker;

function _restoreHandles(){
  try{
    var d=sessionStorage.getItem('sched_fh');
    if(d){var h=JSON.parse(d);_fileHandles.tasks=h.tasks||null;_fileHandles.cats=h.cats||null;_fileHandles.projects=h.projects||null}
  }catch(e){}
}
function _persistHandles(){
  try{sessionStorage.setItem('sched_fh',JSON.stringify(_fileHandles))}catch(e){}
}

async function _readFileHandle(handle){
  var file=await handle.getFile();
  var text=await file.text();
  return JSON.parse(text);
}

async function _ensureHandles(){
  if(_fileHandles.tasks&&_fileHandles.cats&&_fileHandles.projects)return true;
  if(!_fsSupported)return false;
  var ok=confirm('首次使用需要选择数据文件位置（sched_tasks.json / sched_cats.json / sched_projects.json），之后自动读写。是否选择？');
  if(!ok)return false;
  try{
    var handles=await window.showOpenFilePicker({
      multiple:true,
      types:[{description:'JSON Files',accept:{'application/json':['.json']}}]
    });
    for(var i=0;i<handles.length;i++){
      var n=handles[i].name;
      if(n===FILE_NAMES.tasks)_fileHandles.tasks=handles[i];
      else if(n===FILE_NAMES.cats)_fileHandles.cats=handles[i];
      else if(n===FILE_NAMES.projects)_fileHandles.projects=handles[i];
    }
    _persistHandles();
    return !!( _fileHandles.tasks&&_fileHandles.cats&&_fileHandles.projects);
  }catch(e){return false}
}

async function loadData(){
  var hasHandles=await _ensureHandles();
  if(hasHandles){
    if(_fileHandles.tasks)try{tasks=await _readFileHandle(_fileHandles.tasks)}catch(e){tasks=[]}
    if(_fileHandles.cats)try{categories=await _readFileHandle(_fileHandles.cats)}catch(e){categories=JSON.parse(JSON.stringify(DEFAULT_CATS))}
    if(_fileHandles.projects)try{projects=await _readFileHandle(_fileHandles.projects)}catch(e){projects=[]}
  }else{
    // Fallback: try localStorage
    try{var d=localStorage.getItem(ST_T);tasks=d?JSON.parse(d):[]}catch(e){tasks=[]}
    try{var d=localStorage.getItem(ST_C);categories=d?JSON.parse(d):JSON.parse(JSON.stringify(DEFAULT_CATS))}catch(e){categories=JSON.parse(JSON.stringify(DEFAULT_CATS))}
    try{var d=localStorage.getItem(ST_P);projects=d?JSON.parse(d):[]}catch(e){projects=[]}
  }
  if(!categories.length)categories=JSON.parse(JSON.stringify(DEFAULT_CATS));
  if(!projects.length)loadProjectsFromTasks();
  render();
}

function loadProjectsFromTasks(){
  var names=[];
  tasks.forEach(function(t){if(t.project&&names.indexOf(t.project)<0)names.push(t.project)});
  projects=names.map(function(n){return{id:uid(),name:n}});
}

async function _writeJson(key,filename,data){
  var json=JSON.stringify(data,null,2);
  if(_fsSupported){
    var handle=_fileHandles[key];
    if(handle){
      try{
        var perm=await handle.queryPermission({mode:'readwrite'});
        if(perm!=='granted')perm=await handle.requestPermission({mode:'readwrite'});
        if(perm==='granted'){
          var writable=await handle.createWritable();
          await writable.write(json);
          await writable.close();
          return;
        }
      }catch(e){console.error('Write failed:',e)}
    }
  }
  // Fallback: localStorage
  var map={tasks:ST_T,cats:ST_C,projects:ST_P};
  try{localStorage.setItem(map[key],json)}catch(e){}
}

function saveTasks(){_writeJson('tasks',FILE_NAMES.tasks,tasks)}
function saveCats(){_writeJson('cats',FILE_NAMES.cats,categories)}
function saveProjects(){_writeJson('projects',FILE_NAMES.projects,projects)}

function layoutDay(dts){
  if(!dts.length)return;
  dts.sort(function(a,b){return a.startMin-b.startMin||(b.endMin-b.startMin)-(a.endMin-a.startMin)});
  var cols=[];
  dts.forEach(function(t){var placed=false;for(var i=0;i<cols.length;i++){if(t.startMin>=cols[i][cols[i].length-1].endMin){cols[i].push(t);t._col=i;placed=true;break}}if(!placed){t._col=cols.length;cols.push([t])}});
  var total=cols.length;
  dts.forEach(function(t){t._total=total});
}

// ==================== Time Picker Popover ====================
function openTimePicker(which){
  closeTimePicker();
  tpActive=which;

  var pop=document.createElement('div');
  pop.className='tp-popover';
  pop.id='tpPopover';

  // Build presets HTML
  var presetsHtml=
    '<button class="tp-pop-preset tp-now" data-action="now">此刻</button>'+
    '<button class="tp-pop-preset" data-add="1">+1h</button>'+
    '<button class="tp-pop-preset" data-add="2">+2h</button>'+
    '<button class="tp-pop-preset" data-add="3">+3h</button>'+
    '<button class="tp-pop-preset" data-add="4">+4h</button>'+
    '<button class="tp-pop-preset" data-add="5">+5h</button>'+
    '<button class="tp-pop-preset" data-add="6">+6h</button>'+
    '<button class="tp-pop-preset" data-add="7">+7h</button>'+
    '<button class="tp-pop-preset" data-add="8">+8h</button>'+
    '<button class="tp-pop-preset" data-add="9">+9h</button>';

  pop.innerHTML=
    '<div class="tp-pop-tabs">'+
      '<div class="tp-pop-tab'+(which==='start'?' active':'')+'" data-tab="start">开始时间</div>'+
      '<div class="tp-pop-tab'+(which==='end'?' active':'')+'" data-tab="end">结束时间</div>'+
    '</div>'+
    '<div class="tp-pop-body">'+
      '<div class="tp-pop-col"><div class="tp-pop-col-label">时</div><div class="tp-pop-list" id="tpHoursList"></div></div>'+
      '<div class="tp-pop-divider"></div>'+
      '<div class="tp-pop-col"><div class="tp-pop-col-label">分</div><div class="tp-pop-list" id="tpMinsList"></div></div>'+
    '</div>'+
    '<div class="tp-pop-footer">'+
      '<div class="tp-pop-presets">'+presetsHtml+'</div>'+
      '<div class="tp-pop-info">'+
        '<span class="tp-pop-dur" id="tpDur"></span>'+
        '<span class="tp-pop-display" id="tpDisplay">'+fmtM(modalStartMin)+' &mdash; '+fmtM(modalEndMin)+'</span>'+
      '</div>'+
    '</div>';

  document.body.appendChild(pop);
  tpPopover=pop;

  positionPopover(pop);
  buildTimeColumns();
  updatePopDuration();

  document.getElementById('startTimeInput').classList.toggle('active',which==='start');
  document.getElementById('endTimeInput').classList.toggle('active',which==='end');

  // Tab switching
  pop.querySelectorAll('.tp-pop-tab').forEach(function(tab){
    tab.addEventListener('click',function(e){
      e.stopPropagation();
      tpActive=tab.dataset.tab;
      pop.querySelectorAll('.tp-pop-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tpActive)});
      document.getElementById('startTimeInput').classList.toggle('active',tpActive==='start');
      document.getElementById('endTimeInput').classList.toggle('active',tpActive==='end');
      buildTimeColumns();
    });
  });

  // Preset buttons
  pop.querySelectorAll('.tp-pop-preset').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var action=btn.dataset.action;
      var addH=btn.dataset.add;
      if(action==='now'){
        var now=new Date();
        var nowM=Math.round((now.getHours()*60+now.getMinutes())/SNAP)*SNAP;
        modalStartMin=nowM;
        modalEndMin=Math.min(nowM+60,24*60-SNAP);
      }else if(addH){
        modalEndMin=Math.min(modalStartMin+parseInt(addH)*60,24*60-SNAP);
      }
      _modalDur=modalEndMin-modalStartMin;
      updateTimeDisplay();
      updatePopDisplay();
      updatePopDuration();
      buildTimeColumns();
    });
  });

  setTimeout(function(){document.addEventListener('mousedown',onTpOutsideClick)},0);
}

function positionPopover(pop){
  var anchor=document.getElementById('timeRangeField');
  if(!anchor||!pop)return;
  var rect=anchor.getBoundingClientRect();
  var popW=310,popH=420;
  var spaceBelow=window.innerHeight-rect.bottom;
  var spaceAbove=rect.top;
  var top,showAbove=false;
  if(spaceBelow>=popH+12){top=rect.bottom+8}
  else if(spaceAbove>=popH+12){top=rect.top-popH-8;showAbove=true}
  else if(spaceBelow>=spaceAbove){top=rect.bottom+8}
  else{top=Math.max(8,rect.top-popH-8);showAbove=true}
  var left=rect.left+rect.width/2-popW/2;
  left=Math.max(8,Math.min(left,window.innerWidth-popW-8));
  pop.style.top=top+'px';
  pop.style.left=left+'px';
  pop.style.width=popW+'px';
  pop.style.transformOrigin=showAbove?'bottom center':'top center';
}

function buildTimeColumns(){
  var curM=tpActive==='start'?modalStartMin:modalEndMin;
  var curH=Math.floor(curM/60),curMi=curM%60;
  var hoursList=document.getElementById('tpHoursList');
  var minsList=document.getElementById('tpMinsList');
  if(!hoursList||!minsList)return;
  var hHtml='';
  for(var h=0;h<24;h++){
    hHtml+='<div class="tp-pop-item'+(h===curH?' selected':'')+'" data-hour="'+h+'">'+String(h).padStart(2,'0')+'</div>';
  }
  hoursList.innerHTML=hHtml;
  var mArr=[0,5,10,15,20,25,30,35,40,45,50,55];
  var mHtml='';
  for(var i=0;i<mArr.length;i++){
    mHtml+='<div class="tp-pop-item'+(mArr[i]===curMi?' selected':'')+'" data-min="'+mArr[i]+'">'+String(mArr[i]).padStart(2,'0')+'</div>';
  }
  minsList.innerHTML=mHtml;

  hoursList.querySelectorAll('.tp-pop-item').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();onTimePick(parseInt(el.dataset.hour),null)});
  });

    el.addEventListener('click',function(e){e.stopPropagation();onTimePick(null,parseInt(el.dataset.min))});
  });

    var selH=hoursList.querySelector('.selected');

function onTimePick(hour,min){
  if(tpActive==='start'){
    if(hour!==null)modalStartMin=hour*60+(modalStartMin%60);
    if(min!==null)modalStartMin=Math.floor(modalStartMin/60)*60+min;
    if(modalEndMin<=modalStartMin)modalEndMin=Math.min(modalStartMin+_modalDur,24*60-SNAP);
  }else{
    if(hour!==null)modalEndMin=hour*60+(modalEndMin%60);
    if(min!==null)modalEndMin=Math.floor(modalEndMin/60)*60+min;
    if(modalEndMin<=modalStartMin)modalStartMin=Math.max(modalEndMin-_modalDur,0);
  }
  _modalDur=modalEndMin-modalStartMin;
  updateTimeDisplay();
  updatePopDisplay();
  updatePopDuration();
  buildTimeColumns();
}

function updatePopDisplay(){
  var d=document.getElementById('tpDisplay');
  if(d)d.innerHTML=fmtM(modalStartMin)+' &mdash; '+fmtM(modalEndMin);
}
function updatePopDuration(){
  var el=document.getElementById('tpDur');
  if(!el)return;
  var dur=modalEndMin-modalStartMin;
  var h=Math.floor(dur/60),m=dur%60;
  el.textContent=h>0?h+'h'+(m>0?' '+m+'m':''):m+'m';
}
function closeTimePicker(){
  if(tpPopover&&tpPopover.parentNode)tpPopover.parentNode.removeChild(tpPopover);
  tpPopover=null;tpActive='start';
  document.removeEventListener('mousedown',onTpOutsideClick);
  var si=document.getElementById('startTimeInput');
  var ei=document.getElementById('endTimeInput');
  if(si)si.classList.remove('active');
  if(ei)ei.classList.remove('active');
}
function onTpOutsideClick(e){
  if(!tpPopover)return;
  var inPop=tpPopover.contains(e.target);
  var inS=document.getElementById('startTimeInput').contains(e.target);
  var inE=document.getElementById('endTimeInput').contains(e.target);
  if(!inPop&&!inS&&!inE)closeTimePicker();
}
function updateTimeDisplay(){
  document.getElementById('startTimeText').textContent=fmtM(modalStartMin);
  document.getElementById('endTimeText').textContent=fmtM(modalEndMin);
}

// ==================== Drag ====================
function bindDrag(){document.querySelectorAll('.day-column').forEach(function(c){c.onmousedown=onDragStart})}
function onDragStart(e){
  if(e.button!==0||e.target.closest('.task-block'))return;
  var col=e.currentTarget;var rect=col.getBoundingClientRect();var y=e.clientY-rect.top;
  var mins=pxToM(Math.max(0,Math.min(y,TOTAL_H)));
  drag={col,date:col.dataset.date,startMin:mins,endMin:mins+SNAP,overlay:null};
  var ov=document.createElement('div');ov.className='drag-selection';col.appendChild(ov);drag.overlay=ov;
  updateDrag();document.body.classList.add('dragging');e.preventDefault();
}
document.addEventListener('mousemove',function(e){
  if(!drag)return;
  var rect=drag.col.getBoundingClientRect();var y=e.clientY-rect.top;
  var mins=pxToM(Math.max(0,Math.min(y,TOTAL_H)));
  drag.endMin=Math.max(mins,drag.startMin+SNAP);updateDrag();
});
function updateDrag(){
  if(!drag||!drag.overlay)return;
  var top=mToPx(drag.startMin),bot=mToPx(drag.endMin);
  drag.overlay.style.top=top+'px';drag.overlay.style.height=Math.max(bot-top,SNAP_PX)+'px';
  var lbl=drag.overlay.querySelector('.drag-label');
  if(!lbl){lbl=document.createElement('span');lbl.className='drag-label';drag.overlay.appendChild(lbl)}
  lbl.textContent=fmtM(drag.startMin)+' - '+fmtM(drag.endMin);
}
document.addEventListener('mouseup',function(){
  if(!drag)return;drag.overlay.remove();document.body.classList.remove('dragging');
  var s=Math.min(drag.startMin,drag.endMin),e=Math.max(drag.startMin,drag.endMin);
  openCreateModal(drag.date,s,Math.max(e,s+SNAP));drag=null;
});

// ==================== Date Range Picker ====================
var DR_W_NAMES=['日','一','二','三','四','五','六'];
var drLeftMonth=null,drRightMonth=null,drStart=null,drEnd=null,drHover=null,drPhase='start';
var drConfirmCb=null;

function drInit(){
  document.getElementById('drCancel').onclick=drClose;
  document.getElementById('drConfirm').onclick=function(){
    if(drConfirmCb&&drStart&&drEnd){drConfirmCb(ds(drStart),ds(drEnd))}
    drClose();
  };
  document.getElementById('drOverlay').onclick=function(e){if(e.target===e.currentTarget)drClose()};
  document.getElementById('drSide').onclick=function(e){
    var btn=e.target.closest('.dr-side-btn');if(!btn)return;
    var s=btn.dataset.s,today=new Date(),y=today.getFullYear(),m=today.getMonth(),d=today.getDate(),w=today.getDay()||7;
    var a,b;
    if(s==='today'){a=b=today}
    else if(s==='yesterday'){a=b=new Date(y,m,d-1)}
    else if(s==='thisWeek'){a=new Date(y,m,d-w+1);b=new Date(y,m,d-w+7)}
    else if(s==='lastWeek'){a=new Date(y,m,d-w-6);b=new Date(y,m,d-w)}
    else if(s==='thisMonth'){a=new Date(y,m,1);b=new Date(y,m+1,0)}
    else if(s==='lastMonth'){a=new Date(y,m-1,1);b=new Date(y,m,0)}
    if(a&&b){
      drStart=a<b?a:b;drEnd=a<b?b:a;drPhase='end';
      drLeftMonth=new Date(drStart.getFullYear(),drStart.getMonth(),1);
      drRightMonth=new Date(drLeftMonth.getFullYear(),drLeftMonth.getMonth()+1,1);
      drRender();drUpdateInfo();
    }
  };
}

function drOpen(cb){
  drConfirmCb=cb;
  var today=new Date();
  drLeftMonth=new Date(today.getFullYear(),today.getMonth(),1);
  drRightMonth=new Date(today.getFullYear(),today.getMonth()+1,1);
  drStart=null;drEnd=null;drHover=null;drPhase='start';
  drRender();drUpdateInfo();
  document.getElementById('drOverlay').style.display='flex';
}

function drClose(){
  document.getElementById('drOverlay').style.display='none';
  drConfirmCb=null;
}

function drRender(){
  drRenderCal('drCalL',drLeftMonth);
  drRenderCal('drCalR',drRightMonth);
}

function drRenderCal(containerId,monthDate){
  var el=document.getElementById(containerId);
  var y=monthDate.getFullYear(),m=monthDate.getMonth();
  var html='<div class="dr-cal-header">';
  html+='<div class="dr-cal-nav"><button data-nav="-12" title="上一年">&laquo;</button><button data-nav="-1" title="上个月">&lsaquo;</button></div>';
  html+='<span class="dr-cal-title">'+y+'年'+(m+1)+'月</span>';
  html+='<div class="dr-cal-nav"><button data-nav="1" title="下个月">&rsaquo;</button><button data-nav="12" title="下一年">&raquo;</button></div>';
  html+='</div>';
  html+='<div class="dr-weekdays">'+DR_W_NAMES.map(function(n){return '<div class="dr-weekday">'+n+'</div>'}).join('')+'</div>';
  html+='<div class="dr-days">';
  var first=new Date(y,m,1);var startDay=first.getDay()||7;
  var lastDay=new Date(y,m+1,0).getDate();var todayS=ds(new Date());
  for(var d=1;d<=lastDay;d++){
    var dd=new Date(y,m,d);var dateS=ds(dd);
    var cls='dr-day';
    if(dateS===todayS)cls+=' today';
    var effective=drPhase==='end'&&!drEnd?drHover:drEnd;
    if(drStart&&effective){
      var sS=ds(drStart),eS=ds(effective);
      var lo=sS<eS?sS:eS,hi=sS<eS?eS:sS;
      if(dateS===lo)cls+=' start-date';
      if(dateS===hi)cls+=' end-date';
      if(dateS>lo&&dateS<hi)cls+=' in-range';
    }else if(drStart&&dateS===ds(drStart)){
      cls+=' selected';
    }
    html+='<div class="'+cls+'" data-date="'+dateS+'" style="grid-column-start:'+(d===1?startDay:'auto')+'">'+d+'</div>';
  }
  html+='</div>';
  el.innerHTML=html;
  el.querySelectorAll('.dr-cal-nav button').forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var nav=parseInt(btn.dataset.nav);
      var isLeft=containerId==='drCalL';
      var target=isLeft?drLeftMonth:drRightMonth;
      if(Math.abs(nav)===12)target=new Date(target.getFullYear()+nav/12,target.getMonth(),1);
      else target=new Date(target.getFullYear(),target.getMonth()+nav,1);
      if(isLeft){drLeftMonth=target;if(drRightMonth<=drLeftMonth)drRightMonth=new Date(target.getFullYear(),target.getMonth()+1,1)}
      else{drRightMonth=target;if(drLeftMonth>=drRightMonth)drLeftMonth=new Date(target.getFullYear(),target.getMonth()-1,1)}
      drRender();
    };
  });
  el.querySelectorAll('.dr-day').forEach(function(cell){
    cell.onclick=function(e){
      e.stopPropagation();
      var dateS=cell.dataset.date;var p=dateS.split('-');var clicked=new Date(+p[0],+p[1]-1,+p[2]);
      if(drPhase==='start'){drStart=clicked;drEnd=null;drPhase='end'}
      else{
        if(clicked<drStart){drEnd=drStart;drStart=clicked}
        else{drEnd=clicked}
        drPhase='start';
      }
      drRender();drUpdateInfo();
    };
    cell.onmouseenter=function(){
      if(drPhase==='end'){
        var dateS=cell.dataset.date;var p=dateS.split('-');drHover=new Date(+p[0],+p[1]-1,+p[2]);
        drRender();drUpdateInfo();
      }
    };
  });
}

function drUpdateInfo(){
  var el=document.getElementById('drInfo');
  var effective=drPhase==='end'&&!drEnd?drHover:drEnd;
  if(drStart&&effective){
    var a=ds(drStart)<ds(effective)?drStart:effective,b=ds(drStart)<ds(effective)?effective:drStart;
    var days=Math.round((b-a)/86400000)+1;
    el.innerHTML='<span>'+ds(a)+'</span> 至 <span>'+ds(b)+'</span>，共 <span>'+days+'</span> 天';
  }else if(drStart){
    el.innerHTML='<span>'+ds(drStart)+'</span> — 请选择结束日期';
  }else{
    el.textContent='请选择日期范围';
  }
}

// ==================== Export ====================
function exportToMD(start,end){
  try{
    if(!tasks||!tasks.length){alert('当前没有任何任务可导出。');return}
    var visibleTasks=tasks.filter(function(t){return t&&t.date>=start&&t.date<=end});
    if(!visibleTasks.length){alert('当前视图范围内没有任务可导出。');return}
    visibleTasks.sort(function(a,b){if(a.date<b.date)return-1;if(a.date>b.date)return 1;return a.startMin-b.startMin});
    var byDate={};visibleTasks.forEach(function(t){if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t)});
    var sortedDates=Object.keys(byDate).sort();
    var lines=[];
    sortedDates.forEach(function(dateS){
      lines.push('### '+dateS);lines.push('');
      var dayTasks=byDate[dateS];var byProj={};dayTasks.forEach(function(t){var pr=t.project||'未分类项目';if(!byProj[pr])byProj[pr]=[];byProj[pr].push(t)});
      var pKeys=Object.keys(byProj).sort(function(a,b){if(a==='未分类项目')return 1;if(b==='未分类项目')return-1;return a.localeCompare(b,'zh-CN')});
      pKeys.forEach(function(proj){
        lines.push(proj+'：');
        byProj[proj].forEach(function(t,i){var cat=getCat(t.categoryId);lines.push((i+1)+'、'+t.title+'——'+fmtM(t.startMin)+'-'+fmtM(t.endMin)+'、'+(cat?cat.name:'未分类'))});
        lines.push('');
      });
    });
    var mdContent=lines.join('\n');var filename;
    filename='日程_'+start+'_至_'+end+'.md';
    var blob=new Blob(['\uFEFF'+mdContent],{type:'text/markdown;charset=utf-8'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},300);
  }catch(err){console.error('Export error:',err);alert('导出失败：'+err.message)}
}
